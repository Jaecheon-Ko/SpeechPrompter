name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Actions 탭에서 수동 실행 가능

permissions:
  contents: write      # 릴리스 생성에 필요

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle 캐시 설정
        uses: gradle/actions/setup-gradle@v3

      - name: sherpa-onnx AAR 캐시
        uses: actions/cache@v4
        with:
          path: app/libs
          key: sherpa-aar-1.12.40

      - name: sherpa-onnx AAR 준비
        run: |
          V=1.12.40
          mkdir -p app/libs
          if [ ! -f "app/libs/sherpa-onnx-$V.aar" ]; then
            echo "AAR 다운로드 중..."
            curl -fL --retry 3 -o "app/libs/sherpa-onnx-$V.aar" \
              "https://github.com/k2-fsa/sherpa-onnx/releases/download/v$V/sherpa-onnx-$V.aar"
          else
            echo "캐시된 AAR 사용"
          fi
          ls -lh app/libs

      - name: gradlew 실행 권한
        run: chmod +x ./gradlew

      - name: 디버그 APK 빌드
        run: ./gradlew assembleDebug --stacktrace

      - name: APK 이름 정리
        id: rename
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk \
             "out/prompter-${GITHUB_RUN_NUMBER}.apk"
          echo "apk=out/prompter-${GITHUB_RUN_NUMBER}.apk" >> "$GITHUB_OUTPUT"

      # 방법 A: Actions 탭에서 받기 (zip으로 감싸짐)
      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: prompter-apk
          path: out/*.apk

      # 방법 B: 릴리스로 올리기 (폰에서 .apk 직접 다운로드 가능 — 이쪽이 편함)
      - name: latest 릴리스 갱신
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "최신 빌드 (#${{ github.run_number }})"
          body: |
            커밋 `${{ github.sha }}` 기준 자동 빌드된 디버그 APK입니다.
            폰에서 아래 .apk 파일을 눌러 바로 설치하세요.
          files: ${{ steps.rename.outputs.apk }}
          prerelease: true
